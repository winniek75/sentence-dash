<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#E8F0FE" />
    <title>Reading Dash</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #E8F0FE;
        font-family: 'Nunito', sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }

      #app {
        width: 100%;
        height: 100%;
        max-width: 500px;
        max-height: 100vh;
        position: relative;
        box-shadow: 0 0 40px rgba(45, 91, 204, 0.1);
        border-radius: 0;
      }

      canvas {
        display: block;
        touch-action: none;
      }

      /* Loading screen */
      #loading {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(135deg, #E8F0FE 0%, #D4E4FC 50%, #C5D8F7 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-title {
        font-family: 'Fredoka One', cursive;
        font-size: 36px;
        color: #2D5BCC;
        margin-bottom: 8px;
      }

      .loading-subtitle {
        font-family: 'Nunito', sans-serif;
        font-size: 14px;
        color: #5B7DB8;
        margin-bottom: 40px;
      }

      .loading-bar-container {
        width: 200px;
        height: 6px;
        background: rgba(45, 91, 204, 0.15);
        border-radius: 3px;
        overflow: hidden;
      }

      .loading-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4CAF50, #2D5BCC);
        border-radius: 3px;
        animation: loading-progress 2s ease-in-out forwards;
      }

      @keyframes loading-progress {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 100%; }
      }

      .loading-dots {
        margin-top: 20px;
        display: flex;
        gap: 8px;
      }

      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2D5BCC;
        animation: dot-bounce 1.2s infinite;
      }

      .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Safe area support for notched devices */
      @supports (padding: env(safe-area-inset-top)) {
        #app {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      @media (max-width: 420px) {
        #app {
          max-width: 100%;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-title">Reading Dash</div>
      <div class="loading-subtitle">English Reading Training</div>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide loading screen once game is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('loading');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function() { loader.remove(); }, 500);
          }
        }, 2000);
      });
    </script>
  </body>
</html>
